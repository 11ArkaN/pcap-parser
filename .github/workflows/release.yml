name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.6)"
        required: true

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag input
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          # Normalize: add 'v' prefix if missing
          if echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            TAG="v$TAG"
          fi
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: tag '$TAG' does not match expected format vX.Y.Z"
            exit 1
          fi
          if ! git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' does not exist -- creating it on HEAD"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" || { echo "Error: failed to create tag '$TAG'"; exit 1; }
            git push origin "$TAG" || { echo "Error: failed to push tag '$TAG'"; exit 1; }
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare bundled runtime
        shell: pwsh
        run: bun run runtime:prepare

      - name: Build installer
        run: bun run dist

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.RELEASE_TAG || github.ref_name }}
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
